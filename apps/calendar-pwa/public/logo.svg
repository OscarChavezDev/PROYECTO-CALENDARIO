<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none" role="img" aria-label="Mi Calendario">
  <defs>
    <linearGradient id="tile" x1="80" y1="56" x2="432" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3f8bff"/>
      <stop offset="0.55" stop-color="#4458f0"/>
      <stop offset="1" stop-color="#6a34d6"/>
    </linearGradient>
    <linearGradient id="gloss" x1="256" y1="56" x2="256" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="mic" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#bdd2ff" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#6680ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4a3fd0" stop-opacity="0.65"/>
    </radialGradient>
    <linearGradient id="edge" x1="56" y1="56" x2="456" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Glass tile -->
  <rect x="56" y="56" width="400" height="400" rx="112" fill="url(#tile)"/>
  <rect x="56" y="56" width="400" height="400" rx="112" fill="url(#gloss)"/>
  <rect x="58.5" y="58.5" width="395" height="395" rx="109.5" fill="none" stroke="url(#edge)" stroke-width="3"/>

  <!-- Calendar binder tabs -->
  <g fill="#eef3ff">
    <rect x="176" y="120" width="20" height="52" rx="10"/>
    <rect x="262" y="120" width="20" height="52" rx="10"/>
  </g>

  <!-- Calendar body (glass outline) -->
  <rect x="120" y="150" width="216" height="188" rx="40" fill="#ffffff" fill-opacity="0.06"
        stroke="#eef3ff" stroke-opacity="0.92" stroke-width="14"/>
  <line x1="120" y1="206" x2="336" y2="206" stroke="#eef3ff" stroke-opacity="0.55" stroke-width="8"/>

  <!-- Grid dots -->
  <g fill="#dfe8ff">
    <rect x="150" y="232" width="22" height="22" rx="6" fill-opacity="0.85"/>
    <rect x="190" y="232" width="22" height="22" rx="6" fill-opacity="0.8"/>
    <rect x="230" y="232" width="22" height="22" rx="6" fill-opacity="0.7"/>
    <rect x="270" y="232" width="22" height="22" rx="6" fill-opacity="0.6"/>
    <rect x="150" y="272" width="22" height="22" rx="6" fill-opacity="0.78"/>
    <rect x="190" y="272" width="22" height="22" rx="6" fill-opacity="0.72"/>
    <rect x="230" y="272" width="22" height="22" rx="6" fill-opacity="0.62"/>
    <rect x="150" y="312" width="22" height="22" rx="6" fill-opacity="0.7"/>
    <rect x="190" y="312" width="22" height="22" rx="6" fill-opacity="0.62"/>
  </g>

  <!-- Microphone bubble -->
  <circle cx="336" cy="338" r="70" fill="url(#mic)" stroke="#eef3ff" stroke-opacity="0.6" stroke-width="6"/>
  <g fill="#f4f1ff">
    <rect x="324" y="304" width="24" height="46" rx="12"/>
  </g>
  <path d="M306 338a30 30 0 0 0 60 0" fill="none" stroke="#f4f1ff" stroke-width="7" stroke-linecap="round"/>
  <line x1="336" y1="368" x2="336" y2="384" stroke="#f4f1ff" stroke-width="7" stroke-linecap="round"/>
  <line x1="322" y1="384" x2="350" y2="384" stroke="#f4f1ff" stroke-width="7" stroke-linecap="round"/>

  <!-- Sparkles -->
  <g fill="#ffffff">
    <path d="M384 150c2 12 6 16 18 18-12 2-16 6-18 18-2-12-6-16-18-18 12-2 16-6 18-18z" fill-opacity="0.95"/>
    <path d="M410 196c1.2 7 3.6 9.4 10.6 10.6-7 1.2-9.4 3.6-10.6 10.6-1.2-7-3.6-9.4-10.6-10.6 7-1.2 9.4-3.6 10.6-10.6z" fill-opacity="0.8"/>
  </g>
</svg>
